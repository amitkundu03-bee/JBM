<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vehicle IN/OUT</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h2>Vehicle Management System</h2>
